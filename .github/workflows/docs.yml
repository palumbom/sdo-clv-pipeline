name: docs

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[docs]

      - name: Build docs
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            export DOCS_VERSION="dev"
          elif [[ "${GIT_REF}" == refs/tags/* ]]; then
            export DOCS_VERSION="${GIT_REF_NAME}"
          else
            export DOCS_VERSION="dev"
          fi
          sphinx-build -b html docs docs/_build/html

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          SITE_URL: https://michaelpalumbo.me/sdo-clv-pipeline
        run: |
          # Save build output before switching branches
          cp -r docs/_build/html /tmp/docs-build

          # Checkout or create the gh-pages branch
          git fetch origin gh-pages && git checkout gh-pages || {
            git checkout --orphan gh-pages
            git reset --hard
            git clean -fdx
          }

          # Determine version label
          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            VERSION="dev"
          elif [[ "${GIT_REF}" == refs/tags/* ]]; then
            VERSION="${GIT_REF_NAME}"
          else
            VERSION="dev"
          fi

          # Clean up any symlinks left by old mike-based deployments
          find . -maxdepth 1 -type l -delete

          # Remove stale mike artifacts
          rm -rf build sdo_clv_pipeline.egg-info docs versions.json 2>/dev/null || true

          # Deploy versioned docs
          rm -rf "${VERSION}"
          cp -r /tmp/docs-build "${VERSION}"

          # Update latest alias for tagged releases (real copy, not symlink)
          if [[ "${GIT_REF}" == refs/tags/* ]]; then
            rm -rf latest
            cp -r /tmp/docs-build latest
          fi

          # Disable Jekyll processing
          touch .nojekyll

          # Generate switcher.json from version directories
          python3 -c "
          import json, os, re
          site = os.environ['SITE_URL']
          versions = []
          if os.path.isdir('dev'):
              versions.append({'name': 'dev', 'version': 'dev', 'url': f'{site}/dev/'})
          if os.path.isdir('latest'):
              versions.append({'name': 'latest', 'version': 'latest', 'url': f'{site}/latest/', 'preferred': True})
          tags = sorted(
              [d for d in os.listdir('.') if re.match(r'^v\d', d) and os.path.isdir(d)],
              key=lambda x: [int(n) for n in re.findall(r'\d+', x)],
              reverse=True,
          )
          for tag in tags:
              versions.append({'name': tag, 'version': tag, 'url': f'{site}/{tag}/'})
          with open('switcher.json', 'w') as f:
              json.dump(versions, f, indent=2)
          "

          # Top-level redirect (prefer latest, fall back to dev)
          if [ -d "latest" ]; then
            REDIRECT_TARGET="latest"
          else
            REDIRECT_TARGET="dev"
          fi
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=${REDIRECT_TARGET}/"></head>
            <body><a href="${REDIRECT_TARGET}/">Redirect</a></body>
          </html>
          EOF

          git add -A
          git commit -m "deploy docs: ${VERSION}" || echo "No changes to commit"
          git push origin gh-pages
