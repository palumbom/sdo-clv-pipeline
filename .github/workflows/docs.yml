name: docs

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[docs]

      - name: Build docs
        run: sphinx-build -b html docs docs/_build/html

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          # Save build output before switching branches (checkout will wipe it)
          cp -r docs/_build/html /tmp/docs-build

          # Checkout or create the gh-pages branch
          git fetch origin gh-pages && git checkout gh-pages || {
            git checkout --orphan gh-pages
            git reset --hard
            git clean -fdx
          }

          if [ "${GIT_REF}" = "refs/heads/main" ]; then
            VERSION="dev"
          elif [[ "${GIT_REF}" == refs/tags/* ]]; then
            VERSION="${GIT_REF_NAME}"
          else
            VERSION="dev"
          fi

          # Remove old version directory, copy new build
          rm -rf "${VERSION}"
          cp -r /tmp/docs-build "${VERSION}"

          # Update latest alias for tagged releases
          if [[ "${GIT_REF}" == refs/tags/* ]]; then
            rm -rf latest
            cp -r /tmp/docs-build latest
          fi

          # Ensure GitHub Pages doesn't run Jekyll (which ignores _static/, _sources/)
          touch .nojekyll

          # Create a top-level redirect to latest (or dev)
          if [ ! -f index.html ] || [[ "${GIT_REF}" == refs/tags/* ]]; then
            cat > index.html <<'REDIRECT'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=latest/"></head>
            <body><a href="latest/">Redirect</a></body>
          </html>
          REDIRECT
          fi

          git add -A
          git commit -m "deploy docs: ${VERSION}" || echo "No changes to commit"
          git push origin gh-pages
